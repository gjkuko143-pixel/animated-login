<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Animated Register Page</title>

  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#4c63ff;
      overflow:hidden;
    }

    .container{
      width:90%;
      max-width:1000px;
      background:#4c63ff;
      border-radius:25px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:40px;
      box-shadow:0 10px 40px rgba(0,0,0,0.2);
      animation:fade 1s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .left{
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .right{
      flex:1;
      color:white;
      padding:20px;
    }

    .right h1{
      font-size:42px;
      margin-bottom:10px;
    }

    .right p{
      margin-bottom:25px;
      opacity:0.9;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box input{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      font-size:16px;
      outline:none;
    }

    .btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:white;
      color:#4c63ff;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.03);
    }

    @media(max-width:768px){

      .container{
        flex-direction:column;
        text-align:center;
      }

      .right{
        width:100%;
      }

      lottie-player{
        width:250px !important;
        height:250px !important;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="left">

      <lottie-player
      src="https://assets10.lottiefiles.com/packages/lf20_kkflmtur.json"
      background="transparent"
      speed="1"
      style="width:350px;height:350px;"
      loop
      autoplay>
      </lottie-player>

    </div>

    <div class="right">

      <h1>Register now</h1>

      <p>Secure your spot in our upcoming live webinar</p>

      <div class="input-box">
        <input type="text" placeholder="What's your name?">
      </div>

      <div class="input-box">
        <input type="email" placeholder="Enter Email">
      </div>

      <div class="input-box">
        <input type="password" placeholder="Enter Password">
      </div>

      <button class="btn">
        Register
      </button>

    </div>

  </div>

</body>
</html>
