<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Login Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
overflow:hidden;
position:relative;
}

/* Animated Background */

body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,0.05);
border-radius:50%;
top:-150px;
left:-150px;
animation:float 8s infinite ease-in-out;
}

body::after{
content:'';
position:absolute;
width:400px;
height:400px;
background:rgba(255,255,255,0.04);
border-radius:50%;
bottom:-120px;
right:-120px;
animation:float 10s infinite ease-in-out;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-25px);
}
}

/* Main Container */

.container{
width:90%;
max-width:1100px;
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.15);
border-radius:30px;
padding:40px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
z-index:10;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Left Side */

.left{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.left lottie-player{
width:420px;
height:420px;
}

/* Right Side */

.right{
flex:1;
padding:20px;
color:white;
}

.logo{
font-size:18px;
font-weight:600;
margin-bottom:15px;
opacity:0.9;
}

.right h1{
font-size:42px;
margin-bottom:10px;
font-weight:700;
}

.right p{
margin-bottom:30px;
opacity:0.85;
line-height:1.6;
}

/* Inputs */

.input-box{
margin-bottom:20px;
position:relative;
}

.input-box input{
width:100%;
padding:16px 18px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,0.12);
color:white;
font-size:16px;
transition:0.3s;
border:1px solid transparent;
}

.input-box input::placeholder{
color:#dbeafe;
}

.input-box input:focus{
border:1px solid #93c5fd;
background:rgba(255,255,255,0.18);
transform:scale(1.02);
}

/* Button */

.login-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:white;
color:#1e3a8a;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(255,255,255,0.2);
}

/* Bottom */

.bottom-text{
margin-top:18px;
text-align:center;
font-size:14px;
opacity:0.9;
}

.bottom-text a{
color:#bfdbfe;
text-decoration:none;
font-weight:600;
}

/* Mobile Responsive */

@media(max-width:900px){

.container{
flex-direction:column;
text-align:center;
padding:30px 20px;
}

.left lottie-player{
width:280px;
height:280px;
}

.right h1{
font-size:32px;
}

.right{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<lottie-player
src="https://assets1.lottiefiles.com/packages/lf20_gjmecwii.json"
background="transparent"
speed="1"
loop
autoplay>
</lottie-player>

</div>

<div class="right">

<div class="logo">
🏢 Employee Portal
</div>

<h1>Welcome Back</h1>

<p>
Secure employee access system for company staff and internal resources.
</p>

<div class="input-box">
<input type="email" placeholder="Employee Email">
</div>

<div class="input-box">
<input type="password" placeholder="Password">
</div>

<button class="login-btn">
Login to Dashboard
</button>

<div class="bottom-text">
Need help? <a href="#">Contact HR Support</a>
</div>

</div>

</div>

</body>
</html>
